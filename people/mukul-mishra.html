<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mukul Mishra | Busino Lab</title>
    <style>

        :root {
            --ink: #081446;
            --muted: #566074;
            --penn-blue: #011f5b;
            --soft: #f7f8fc;
            --line: #e4e8f3;
            --shadow: 0 18px 56px rgba(8, 20, 70, 0.10);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--muted);
            background: #fff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        header {
            background: rgba(255,255,255,0.96);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(16px);
        }
        .header-wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0.9rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }
        .brand-container { display: flex; align-items: center; gap: 16px; }
        .lab-logo { height: 112px; width: auto; object-fit: contain; display: block; }
        .header-psom-logo { height: 58px; width: auto; max-width: 300px; object-fit: contain; display: block; }
        .institution-logos { display: flex; align-items: center; justify-content: flex-end; gap: 1rem; flex-shrink: 0; }
        .institution-logo-link { display: inline-flex; align-items: center; text-decoration: none; transition: opacity 0.2s ease; }
        .institution-logo-link:hover { opacity: 0.78; }
        .header-cbio-logo { height: 118px; width: auto; max-width: 240px; object-fit: contain; display: block; }
        .site-title h1 { font-size: 1.32rem; font-weight: 850; color: var(--ink); letter-spacing: -0.04em; line-height: 1; }
        .site-title p { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.09em; margin-top: 0.4rem; font-weight: 700; }
        .back-link {
            display: inline-block;
            color: var(--penn-blue);
            text-decoration: none;
            font-weight: 850;
            font-size: 0.86rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 4.5rem 2rem 5.5rem;
        }
        .profile-layout {
            display: grid;
            grid-template-columns: minmax(280px, 420px) 1fr;
            gap: 3.5rem;
            align-items: start;
        }
        .profile-image {
            width: 100%;
            border-radius: 28px;
            object-fit: cover;
            object-position: center top;
            box-shadow: var(--shadow);
            border: 1px solid var(--line);
            background: var(--soft);
        }
        .profile-placeholder {
            width: 100%;
            aspect-ratio: 4 / 4.4;
            border-radius: 28px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            background: linear-gradient(135deg, #f3f5ff, #ffffff);
            color: var(--penn-blue);
            display: grid;
            place-items: center;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -0.08em;
        }
        .kicker {
            color: var(--penn-blue);
            text-transform: uppercase;
            letter-spacing: 0.13em;
            font-size: 0.78rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }
        h1 {
            color: var(--ink);
            font-size: clamp(2.2rem, 5vw, 4.1rem);
            line-height: 0.98;
            letter-spacing: -0.07em;
            font-weight: 900;
            margin-bottom: 1rem;
        }
        .title {
            color: var(--muted);
            font-size: 1.08rem;
            font-weight: 750;
            margin-bottom: 1.5rem;
        }
        .email {
            margin-bottom: 2rem;
            font-weight: 800;
        }
        .email a { color: var(--penn-blue); text-decoration: none; }
        .bio-card {
            border: 1px solid var(--line);
            background: linear-gradient(180deg, #fff, var(--soft));
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 12px 38px rgba(8,20,70,0.06);
        }
        .bio-card p {
            font-size: 1.02rem;
            line-height: 1.75;
            margin-bottom: 1.15rem;
        }
        .bio-card p:last-child { margin-bottom: 0; }
        footer {
            border-top: 1px solid var(--line);
            background: var(--soft);
            padding: 2rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
        }
        @media (max-width: 900px) {
            .header-wrap { flex-direction: column; text-align: center; }
            .profile-layout { grid-template-columns: 1fr; gap: 2rem; }
            main { padding: 3rem 1.25rem 4rem; }
            .lab-logo { height: 112px; }
            .header-psom-logo { height: 50px; max-width: 280px; }
            .header-cbio-logo { height: 88px; max-width: 220px; }
            .institution-logos { justify-content: center; flex-wrap: wrap; }
        }

    </style>
</head>
<body>
    <header>
        <div class="header-wrap">
            <div class="brand-container">
                <img src="../BusinoLab_logo_header.png" alt="Busino Lab Logo" class="lab-logo">
                <div class="site-title">
                    <h1>Busino Lab</h1>
                    <p>University of Pennsylvania</p>
                </div>
            </div>
            <a class="back-link" href="../index.html#people">Back to people</a>
            <div class="institution-logos" aria-label="Institution links">
                <a href="https://www.cbio.med.upenn.edu/" target="_blank" rel="noopener" class="institution-logo-link" aria-label="Department of Cancer Biology">
                    <img src="../CBIOlogo_header.png" alt="Department of Cancer Biology" class="header-cbio-logo">
                </a>
                <a href="https://www.med.upenn.edu/" target="_blank" rel="noopener" class="institution-logo-link" aria-label="Perelman School of Medicine">
                    <img src="../psom_logo_blue@2x.png" alt="Perelman School of Medicine, University of Pennsylvania" class="header-psom-logo">
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="profile-layout">
            <div>
                <div class="profile-placeholder" aria-label="Mukul Mishra profile placeholder">MM</div>
            </div>
            <div>
                <div class="kicker">Research profile</div>
                <h1>Mukul Mishra</h1>
                <div class="title">Lab Member</div>
                <div class="email"><span>Email coming soon</span></div>
                <div class="bio-card">
                    <p>Research profile coming soon.</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 The Busino Lab. Perelman School of Medicine, University of Pennsylvania.
    </footer>
</body>
</html>
